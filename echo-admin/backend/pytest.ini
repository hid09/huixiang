[pytest]
# pytest 配置文件
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记
markers =
    auth: 认证相关测试
    dashboard: 数据看板测试
    users: 用户管理测试
    admin: 管理员管理测试
    security: 安全测试
    slow: 慢速测试
