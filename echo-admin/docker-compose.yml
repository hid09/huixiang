version: '3.8'

services:
  # 后端服务
  backend:
    build: ./backend
    container_name: echo-admin-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      # 回响 app 数据库（只读，读取用户数据）
      - /root/huixiang/echo-app/data/echo.db:/app/data/echo.db:ro
      # 管理员数据库（可写，存储管理员账号）
      - echo-admin-data:/app/data
    networks:
      - echo-admin-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务（含 nginx）
  frontend:
    build: ./frontend
    container_name: echo-admin-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - echo-admin-network
    depends_on:
      - backend

networks:
  echo-admin-network:
    driver: bridge

volumes:
  echo-admin-data:
