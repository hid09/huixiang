version: '3.8'

services:
  # 后端服务
  backend:
    build: ./backend
    container_name: echo-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data  # 持久化数据库
    networks:
      - echo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端服务
  frontend:
    build: ./frontend
    container_name: echo-frontend
    restart: unless-stopped
    networks:
      - echo-network
    depends_on:
      - backend

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: echo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # HTTPS 证书目录
    networks:
      - echo-network
    depends_on:
      - frontend
      - backend

networks:
  echo-network:
    driver: bridge
